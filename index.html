    <script type="application/ld+json">

      "@context": "https://schema.org",

        "@type": "AggregateOffer",
        "priceCurrency": "BRL",
        "lowPrice": "149",
        "highPrice": "799",
        "offerCount": "3"
      },
      "provider": {
        "@type": "Organization",
        "name": "DoctorChatBot"
      },
      "featureList": [
        "Chatbot inteligente no WhatsApp",
        "Painel de aprovação de agendamentos",
